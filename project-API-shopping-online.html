<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script>
      function GetCategoies(){
        fetch("https://fakestoreapi.com/products/categories")
            .then(function(response){
                return response.json();
      })
      .then(function(data){
                data.unshift("All");
                for(var item of data)
            {
                var option =document.createElement("option");
                option.text = item.toUpperCase();
                option.value=item;
                document.getElementById("lstCategory").appendChild(option);
            }

            })
          }
          function GetProducts(url){
            document.getElementById("ProductsContainer").innerHTML="";
          

          fetch(url)
          .then(function(response){
                return response.json();
          })
          .then(function(data){
            for(var item of data){
               var div =document.createElement("div");
            div.className="card m-2 p-2";
            div.style.width = "200px";
            div.innerHTML=`<img src=${item.image} class="card-img-top"height="200">
           
            <div class="card-header" style="hegiht:200px">
                <p>${item.title}</p>
                
                <div class="card-body">
                    <p>${item.price}</p>
                    <p>Rating : ${item.rating.rate}</p>
                    <p>Count : ${item.rating.count}</p>
                    </div>
                   
                    <div class="card-footer">
                        <button  onclick="AddToCartClick(${item.id})"class="btn btn-danger w-100">
                            <span class="bi bi-cart-4"></span>
                            Add to Cart
                            <button>
                                </div>
                    `;
                    document.getElementById("ProductsContainer").appendChild(div);
                            
            }

          })
        }
        function bodyload(){
          GetCategoies();
          GetProducts("https://fakestoreapi.com/products");
          GetCartItemsCount();
        }
         function CategoryChanged(){
         }
         function CategoryChanged(){
         var categoryName= document.getElementById("lstCategory").value;
         if(categoryName=="All"){
          GetProducts("https://fakestoreapi.com/products/category");
         }else{
          GetProducts(`https://fakestoreapi.com/products/category/${categoryName}`);
         }
        }
         var cartItems =[];
        var count=0;
        function GetCartItemsCount(){
        count= cartItems.length;
        document.getElementById("cartCount").innerHTML=count;
          }
        
          function AddToCartClick(id){
          fetch(`https://fakestoreapi.com/products/${id}`)
          .then(function(response){
        return response.json();

    })
    .then(function(data){
        cartItems.push(data);
        alert("Item Added to Cart");
        alert("Item Added to Cart");
        GetCartItemsCount();
    })

}
      function ShowCartClick(){
        for(var item of cartItems){
        var tr= document.createElement("tr");
        var tdTitle=document.createElement("td");
        var tdPrice=document.createElement("td");
        var tdphoto=document.createElement("td");

        tdTitle.innerHTML=item.title;
        tdPrice.innerHTML=item.price;

        var img =document.createElement("img");
        img.src= item.image;
        img.width="100";
        img.height="100";

        tdphoto.appendChild(img);
        tr.appendChild(tdTitle);
        tr.appendChild(tdPrice);
        tr.appendChild(tdphoto);
        document.querySelector("tbody").appendChild(tr);
    }
}
 </script>
</head>
<body class="container-fluid"onload="bodyload()">

   <header class="bg-danger text-white text-center p-2">
        <h1><span class="bi bi-cart4"></span>Shopping online</h1>
    </header>
    <div class="row mt-3">
       
      <div class="col-2">
          <h3>Select a Category</h3>
            <select class="form-select mt-2"id="lstCategory"onchange="CategoryChanged()">
            </select>
           </div>
        
        <div class="col-8">
           <div id="ProductsContainer" class="d-flex flex-wrap overflow-auto"style="height:500px">
        </div>
        </div>
      
        <div class="col-2">
            <button onclick="ShowCartClick()"class="btn btn-warning mt-4 w-100" data-bs-target="#cart" data-bs-toggle="modal">
                <span id="cartCount"></span>
                <span class="bi bi-cart3"></span>
                Your Cart itms
            </button>
            </div>
            
             <div class="modal fade" id="cart">
                <div class="modal-dialog modal-dialog-centered">
                    <div classs="modal-content">
                        <div class="modal-header">
                            <h3>Your Cart Items</h3>
                            <button class="btn-close"data-bs-dismiss="modal"></button>
                         </div>

                        <div class="modal-body">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>Title</th>
                                        <th>Price</th>
                                        <th>Preivew</th>
                                    </tr>
                                </thead>
                                <tbody>

                                </tbody>
                            </table>
                        </div>
                        
                        <div class="modal-footer">
                            <button data-bs-dismiss="modal" class="btn btn-success">Ok</button>
                        </div>
                       </div>
                        </div>
                        </div>
                        </div>
                        </div>
                        
                
          
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  
  </body>
</html>
